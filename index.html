<!DOCTYPE html>
<html lang="en">

<!-- See'n Say StoryMaker Assignment 1 -->
<!-- Natasha Bertrand - 200458345 -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>See'N Say StoryMaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap">
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
</head>

<body>
    <!-- Page Header -->
     <header id="site-header">
        <h1>See'N Say StoryMaker</h1>
        <p>Click each button to cycle through words. When you're happy, click "Tell My Story"</p>
     </header>

     <!-- Word Selector Section -->
      <main id="story-maker">
        <section id="word-selectors">
            <h2>Build Your Own Story</h2>
            <!-- Word slot one - WHO(Subject) -->
            <div class="word-slot">
                <span class="slot-label">Who</span>
                <button id="btn-who" class="word-btn" type="button">A little bear</button>
            </div>

            <!-- Word slot two - DID WHAT(Verb) -->
            <div class="word-slot">
                <span class="slot-label">Did what?</span>
                <button id="btn-action" class="word-btn" type="button">happily skipped</button>
            </div>

            <!-- Word slot three - WHERE(Place) -->
            <div class="word-slot">
                <span class="slot-label">Where?</span>
                <button id="btn-where" class="word-btn" type="button">through the forest</button>
            </div>

            <!-- Word slot four - WITH WHAT(Object) -->
            <div class="word-slot">
                <span class="slot-label">With what?</span>
                <button id="btn-object" class="word-btn" type="button">carrying a lantern</button>
            </div>

            <!-- Word slot five - ENDING(Outcome) -->
            <div class="word-slot">
                <span class="slot-label">And then?</span>
                <button id="btn-ending" class="word-btn" type="button">found a hidden door</button>
            </div>
        </section>

        <!-- Tell my Story button -->
         <div id="story-trigger">
            <button id="btn-story" type="button">Tell My Story!</button>
            <button id="btn-reset" type="button">Reset</button>
         </div>

         <div id="rand-story-trigger">
            <button id="btn-random" type="button">Create a Random Story!</button>
         </div>

         <!-- Story Output Area -->
         <section id="story-output">
            <h2>Your Story</h2>
            <p id="story-text"></p>
         </section>

         <!-- Previous Stories Section -->
        <section id="previous-stories">
            <h2>Previous Stories</h2>
            <div id="stories-list"></div>
            <button id="btn-delete" type="button">Delete All Stories</button>
        </section>

      </main>
      <footer>
        <p>Inspired by Mattel® See'N Say Storymaker.</p>
      </footer>
</body>

</html>
